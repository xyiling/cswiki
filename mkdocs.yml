site_name: "xyiling's cs notes" # 站点名称，显示于导航栏
site_url: "https://xyiling.github.io/cswiki" # 部署后的域名
site_description: 记录学习过程中遇到的问题和解决方法
site_author: xyiling

theme:
  name: material # 启用 Material 主题
  custom_dir: docs/custom/overrides
  features:
    - navigation.tabs # 顶部标签页导航
    - navigation.sections # 自动提取标题生成章节锚点
  palette:
    - scheme: default # 浅色模式
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate # 暗黑模式（用户可切换）
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  language: 'zh'
  tabs: false


repo_name: 'xyiling/cswiki'
repo_url: 'https://github.com/xyiling/cswiki'

extra_css:
  - custom/styles/extra.css # 自定义CSS
  - custom/styles/custom.css # 自定义CSS
extra:
  palette:
    primary: 'Blue Grey'
    accent: 'Pink'
  social:
    - type: github
      link: https://github.com/xyiling
      icon: fontawesome/brands/github

markdown_extensions:
  - admonition
  - codehilite:
      guess_lang: false
      linenums: false
  - toc:
      permalink: true
  - footnotes
  - meta
  - def_list
  - pymdownx.arithmatex
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  # - pymdownx.emoji:
      # emoji_generator: !!python/name:pymdownx.emoji.to_png
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true # 推荐开启，对移动端排版更友好
  - pymdownx.tasklist
  - pymdownx.tilde

extra_javascript:
  - 'custom/js/extra.js'
  - 'https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.0/MathJax.js?config=TeX-MML-AM_CHTML'


nav: # 导航栏菜单结构，层级与目录结构对应
  - 首页:
    - 前言: index.md
    - 灵感: inspiration.md
    - 归档: archive.md
    - 日常: daily.md
  - 工具合集:
    - 工具网站: tools/websites.md
    - 导航网址: tools/navigation.md 
  - 项目管理:
    - 项目笔记: projects/index.md
    - 待办事项: projects/todo.md
  - 技术沉淀:
    - python技术笔记: notes/python技术笔记.md
    - rust技术笔记: notes/rust技术笔记.md
    - cxx技术笔记: notes/cxx技术笔记.md
    - go语言学习笔记: notes/go语言学习笔记.md
    - java学习笔记: notes/java学习笔记.md
    - vue学习笔记: notes/vue学习笔记.md
    - react学习笔记: notes/react学习笔记.md
    - css学习笔记: notes/css学习笔记.md
    - 算法学习笔记: notes/algorithms.md
    - 数据库学习笔记: notes/database.md
    - shell学习笔记: notes/shell笔记.md
    - 并发编程笔记: notes/并发编程.md
    - pandas学习笔记: notes/pandas笔记.md

  - 读书笔记:
    - 理想国: books/理想国.md
  - 课程笔记:
    - jyyOS: courses/jyyOS课程笔记.md
    - hitOS: courses/hitOS课程笔记.md
    - hit体系结构: courses/hit体系结构课程笔记.md

